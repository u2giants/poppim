# Directus PM system — AUTHORITATIVE copy of the deployed Coolify service.
# Deployed as Coolify service "poppim" (uuid nzli85mk3luzb6u7cnq5fidu) on server onwp0kd7w1w74w9yeotnoihp.
# Live at https://pm.designflow.app. All ${...} values are set as RUNTIME env in Coolify (never in this repo).
# Coolify magic vars: SERVICE_FQDN_POPPIMAPP_8055 binds the public domain to container port 8055.
# Custom domain is also stored in Coolify DB service_applications.fqdn (see AGENTS.md §11).
# To change the schema: run pm-system/apply-schema.mjs against the instance, then restart the service.
services:
  poppim-app:
    image: directus/directus:11
    expose:
      - "8055"
    environment:
      SERVICE_FQDN_POPPIMAPP_8055: pm.designflow.app
      KEY: ${DX_KEY}
      SECRET: ${DX_SECRET}
      PUBLIC_URL: https://pm.designflow.app
      ADMIN_EMAIL: ${DX_ADMIN_EMAIL}
      ADMIN_PASSWORD: ${DX_ADMIN_PASSWORD}
      DB_CLIENT: pg
      DB_HOST: poppim-db
      DB_PORT: "5432"
      DB_DATABASE: directus
      DB_USER: directus
      DB_PASSWORD: ${DX_DB_PASSWORD}
      LICENSE_KEY: ${DX_LICENSE_KEY}          # Directus Open Innovation Grant license
      AUTH_PROVIDERS: microsoft
      AUTH_MICROSOFT_DRIVER: openid
      AUTH_MICROSOFT_CLIENT_ID: ${MS_CLIENT_ID}
      AUTH_MICROSOFT_CLIENT_SECRET: ${MS_CLIENT_SECRET}
      AUTH_MICROSOFT_ISSUER_URL: https://login.microsoftonline.com/${MS_TENANT_ID}/v2.0/.well-known/openid-configuration
      AUTH_MICROSOFT_IDENTIFIER_KEY: preferred_username
      AUTH_MICROSOFT_LABEL: "Sign in with Microsoft"
      AUTH_MICROSOFT_ICON: grid_view
      AUTH_MICROSOFT_ALLOW_PUBLIC_REGISTRATION: "true"   # any M365 tenant user auto-provisions
      AUTH_MICROSOFT_DEFAULT_ROLE_ID: "7c7299c9-bf6c-44f6-b952-b6983a3ca6e8"   # non-admin Designer role (instance-specific uuid)
      WEBSOCKETS_ENABLED: "true"
      TELEMETRY: "false"
    volumes:
      - poppim-extensions:/directus/extensions   # persists Marketplace-installed extensions across redeploys (e.g. advanced-kanban-layout)
    depends_on:
      - poppim-db
  poppim-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: directus
      POSTGRES_PASSWORD: ${DX_DB_PASSWORD}
      POSTGRES_DB: directus
    volumes:
      - poppim-pgdata:/var/lib/postgresql/data
volumes:
  poppim-pgdata:
  poppim-extensions:
